  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:   oklch(96% 0.014 130);
      --cream2:  oklch(91% 0.02  130);
      --navy:    oklch(20% 0.05  145);
      --blue:    oklch(50% 0.10  150);
      --blue-lt: oklch(60% 0.09  150);
      --gold:    oklch(72% 0.11  80);
      --coral:   oklch(64% 0.12  40);
      --gray:      oklch(58% 0.015 160);
      --vallenato: oklch(58% 0.16 320);
      --card-r:    5px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Barlow', sans-serif; background: var(--cream); color: var(--navy); overflow-x: hidden; }

    /* ── HERO ── */
    .hero { position: relative; min-height: 100svh; display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden; background: var(--navy); }
    .hero-img { position: absolute; inset: 0; background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1600&q=80'); background-size: cover; background-position: center 50%; opacity: .4; }
    .hero::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 140px; background: var(--cream); clip-path: polygon(0 100%, 100% 100%, 100% 0); }
    .hero-content { position: relative; z-index: 2; padding: clamp(2rem,5vw,5rem); padding-bottom: clamp(5.5rem,13vw,11rem); }
    .hero-eyebrow { font-family: 'Barlow Condensed', sans-serif; font-weight: 500; font-size: clamp(.75rem,1.5vw,1rem); letter-spacing: .25em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .hero-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(3.5rem,12vw,11rem); line-height: .9; color: white; letter-spacing: -.02em; text-wrap: balance; }
    .hero-title span { color: var(--gold); display: block; }
    .hero-meta { display: flex; align-items: center; gap: 1.5rem; margin-top: 2rem; flex-wrap: wrap; }
    .hero-dates { font-family: 'Barlow Condensed', sans-serif; font-size: clamp(1rem,2.5vw,1.4rem); font-weight: 600; color: white; letter-spacing: .05em; opacity: .85; }
    .hero-badge { background: var(--gold); color: var(--navy); font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: .75rem; letter-spacing: .15em; text-transform: uppercase; padding: .4rem 1rem; border-radius: 2px; }

    /* ── NAV ── */
    .day-nav { position: sticky; top: 0; z-index: 100; background: var(--navy); display: flex; justify-content: center; overflow-x: auto; scrollbar-width: none; }
    .day-nav::-webkit-scrollbar { display: none; }
    .day-nav a { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: .8rem; letter-spacing: .15em; text-transform: uppercase; color: rgba(255,255,255,.5); padding: 1rem 1.5rem; text-decoration: none; border-bottom: 2px solid transparent; transition: color .2s, border-color .2s; white-space: nowrap; }
    .day-nav a:hover, .day-nav a.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* ── DAY SECTION ── */
    .day-section { padding: clamp(3rem,8vw,6rem) clamp(1.25rem,5vw,4rem); max-width: 1200px; margin: 0 auto; }
    .day-header { display: grid; grid-template-columns: auto 1fr; gap: 1.5rem 2rem; align-items: start; margin-bottom: 2.5rem; }
    .day-number { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(5rem,14vw,9rem); line-height: 1; color: transparent; -webkit-text-stroke: 2px var(--blue); opacity: .2; user-select: none; }
    .day-info { padding-top: 1rem; }
    .day-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 500; font-size: .75rem; letter-spacing: .2em; text-transform: uppercase; color: var(--blue-lt); margin-bottom: .4rem; }
    .day-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: clamp(1.4rem,4vw,2.4rem); line-height: 1.1; color: var(--navy); }
    .day-city { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 400; color: var(--gray); margin-top: .5rem; letter-spacing: .05em; }
    .section-divider { height: 1px; background: linear-gradient(90deg, var(--blue) 0%, transparent 100%); margin: 0 clamp(1.25rem,5vw,4rem); opacity: .15; }
    .day-img-banner { width: 100%; height: clamp(180px,28vw,320px); object-fit: cover; border-radius: 8px; margin-bottom: 2.5rem; display: block; }

    /* ── EVENT CARDS ── */
    .timeline { display: flex; flex-direction: column; gap: .5rem; }
    .event-card { display: grid; grid-template-columns: 110px 1fr auto; gap: 0; align-items: stretch; background: white; border-radius: var(--card-r); overflow: hidden; cursor: pointer; transition: transform .18s, box-shadow .18s; }
    .event-card:hover { transform: translateX(4px); box-shadow: -4px 0 0 var(--accent-color, var(--blue)), 0 6px 28px rgba(0,0,0,.09); }
    .event-card:hover .event-arrow { opacity: 1; }
    .event-time { background: var(--navy); color: rgba(255,255,255,.7); font-family: 'Barlow Condensed', sans-serif; font-size: .78rem; font-weight: 500; letter-spacing: .03em; display: flex; align-items: center; justify-content: center; text-align: center; padding: 1rem .75rem; min-height: 68px; white-space: pre-line; line-height: 1.4; }
    .event-body { padding: .9rem 1.2rem; border-left: 3px solid var(--accent-color, var(--blue)); display: flex; flex-direction: column; justify-content: center; gap: .3rem; }
    .event-tipo { font-family: 'Barlow Condensed', sans-serif; font-size: .62rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--accent-color, var(--blue)); }
    .event-titulo { font-family: 'Barlow', sans-serif; font-size: clamp(.88rem,2vw,.98rem); font-weight: 500; color: var(--navy); line-height: 1.3; }
    .event-nota { font-family: 'Barlow', sans-serif; font-size: .76rem; font-style: italic; color: var(--gray); line-height: 1.4; }
    .event-zona { display: inline-flex; align-items: center; gap: .3rem; font-family: 'Barlow Condensed', sans-serif; font-size: .63rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--gray); }
    .event-zona::before { content: ''; display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--gray); }
    .event-arrow { display: flex; align-items: center; padding: 0 1rem; opacity: .35; transition: opacity .18s; color: var(--accent-color, var(--blue)); font-size: 1rem; }

    /* TYPE COLORS */
    .tipo-atraccion   { --accent-color: var(--blue); }
    .tipo-comida      { --accent-color: var(--gold); }
    .tipo-descanso    { --accent-color: var(--gray); }
    .tipo-alojamiento { --accent-color: var(--navy); }
    .tipo-transporte  { --accent-color: var(--coral); }
    .tipo-evento      { --accent-color: var(--vallenato); }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); animation: fadeOverlay .2s ease; }
    @keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }
    .modal-box { background: white; border-radius: 12px; width: 100%; max-width: 560px; max-height: 90svh; overflow-y: auto; animation: slideUp .25s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .modal-img { width: 100%; height: clamp(180px,40vw,260px); object-fit: cover; border-radius: 12px 12px 0 0; display: block; }
    .modal-content { padding: 1.5rem; }
    .modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1rem; }
    .modal-tipo { font-family: 'Barlow Condensed', sans-serif; font-size: .65rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--accent-color, var(--blue)); margin-bottom: .3rem; }
    .modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: clamp(1.15rem,3vw,1.5rem); color: var(--navy); line-height: 1.2; }
    .modal-hora { font-family: 'Barlow Condensed', sans-serif; font-size: .85rem; color: var(--gray); margin-top: .3rem; letter-spacing: .05em; }
    .modal-close { flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--cream2); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; color: var(--gray); transition: background .15s; }
    .modal-close:hover { background: var(--cream2); }
    .modal-desc { font-family: 'Barlow', sans-serif; font-size: .93rem; line-height: 1.6; color: var(--navy); opacity: .8; margin-bottom: 1.25rem; }
    .modal-sugs-title { font-family: 'Barlow Condensed', sans-serif; font-size: .68rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--blue-lt); margin-bottom: .75rem; }
    .modal-sugs { display: flex; flex-direction: column; gap: .6rem; }
    .modal-sug { display: flex; gap: .75rem; align-items: flex-start; font-family: 'Barlow', sans-serif; font-size: .87rem; line-height: 1.45; color: var(--navy); opacity: .85; }
    .modal-sug-dot { flex-shrink: 0; width: 7px; height: 7px; border-radius: 50%; background: var(--accent-color, var(--blue)); margin-top: 5px; }
    .modal-zona-row { display: flex; align-items: center; gap: .5rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--cream2); font-family: 'Barlow Condensed', sans-serif; font-size: .75rem; letter-spacing: .08em; text-transform: uppercase; color: var(--gray); }

    /* ── TWEAKS ── */
    .tweaks-panel { position: fixed; bottom: 1.5rem; right: 1.5rem; background: white; border: 1px solid rgba(0,0,0,.1); border-radius: 10px; padding: 1.25rem; width: 230px; box-shadow: 0 8px 40px rgba(0,0,0,.15); z-index: 9999; font-family: 'Barlow', sans-serif; }
    .tweaks-title { font-family: 'Syne', sans-serif; font-size: .8rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--navy); margin-bottom: 1rem; border-bottom: 1px solid var(--cream2); padding-bottom: .6rem; }
    .tweak-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: .75rem; font-size: .82rem; color: var(--navy); }
    .tweak-row label { font-weight: 500; }
    .tweak-row select { font-size: .78rem; border: 1px solid var(--cream2); border-radius: 4px; padding: .2rem .4rem; color: var(--navy); background: white; }

    /* ── FOOTER ── */
    footer { background: var(--navy); color: rgba(255,255,255,.4); text-align: center; padding: 2rem; font-family: 'Barlow Condensed', sans-serif; font-size: .8rem; letter-spacing: .1em; text-transform: uppercase; }
    footer strong { color: var(--gold); font-weight: 600; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up  { animation: fadeUp .6s ease both; }
    .fade-up-2{ animation: fadeUp .6s ease .15s both; }
    .fade-up-3{ animation: fadeUp .6s ease .3s both; }

    @media (max-width: 600px) {
      .event-card { grid-template-columns: 75px 1fr auto; }
      .event-time { font-size: .7rem; padding: .7rem .45rem; }
      .day-header { grid-template-columns: 1fr; gap: .5rem; }
      .day-number { display: none; }
    }
  </style>
</head>

/* ── MODAL ── */
function EventModal({ ev, onClose }) {
  React.useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', handler);
    document.body.style.overflow = 'hidden';
    return () => { document.removeEventListener('keydown', handler); document.body.style.overflow = ''; };
  }, []);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className={`modal-box tipo-${ev.tipo}`} onClick={e => e.stopPropagation()}>
        <img src={ev.img} alt={ev.titulo} className="modal-img" loading="lazy" />
        <div className="modal-content">
          <div className="modal-header">
            <div>
              <p className="modal-tipo">{TIPO_LABELS[ev.tipo]}</p>
              <h2 className="modal-title">{ev.titulo}</h2>
              <p className="modal-hora">{ev.hora.replace(/\n/g, ' ')}</p>
            </div>
            <button className="modal-close" onClick={onClose} aria-label="Cerrar">✕</button>
          </div>

          <p className="modal-desc">{ev.desc}</p>

          <p className="modal-sugs-title">Sugerencias</p>
          <div className="modal-sugs">
            {ev.sugerencias.map((s, i) => (
              <div className="modal-sug" key={i}>
                <span className="modal-sug-dot" />
                <span>{s}</span>
              </div>
            ))}
          </div>

          {(ev.zona || ev.nota) && (
            <div className="modal-zona-row">
              {ev.zona && <span>📍 {ev.zona}</span>}
              {ev.zona && ev.nota && <span style={{opacity:.4}}>·</span>}
              {ev.nota && <span style={{fontStyle:'italic', opacity:.7}}>{ev.nota}</span>}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── EVENT CARD ── */
function EventCard({ ev, showNotas, compact, onOpen }) {
  return (
    <div className={`event-card tipo-${ev.tipo}`} onClick={() => onOpen(ev)}
      style={{ padding: compact ? '0' : undefined }}
      role="button" tabIndex={0}
      onKeyDown={e => (e.key === 'Enter' || e.key === ' ') && onOpen(ev)}>
      <div className="event-time">{ev.hora}</div>
      <div className="event-body">
        <span className="event-tipo">{TIPO_LABELS[ev.tipo]}</span>
        <span className="event-titulo">{ev.titulo}</span>
        {ev.zona && <span className="event-zona">{ev.zona}</span>}
        {showNotas && ev.nota && <span className="event-nota">{ev.nota}</span>}
      </div>
      <div className="event-arrow">›</div>
    </div>
  );
}

/* ── DAY SECTION ── */
function DaySection({ day, showNotas, compact, onOpen }) {
  const num = String(day.id).padStart(2, '0');
  return (
    <section id={day.slug}>
      <div className="day-section">
        <div className="day-header">
          <div className="day-number" aria-hidden="true">{num}</div>
          <div className="day-info">
            <p className="day-label">Día {day.id} de 4</p>
            <h2 className="day-title">{day.fecha}</h2>
            <p className="day-city">{day.ciudad}{day.checkout ? ` — ${day.checkout}` : ''}</p>
          </div>
        </div>
        <img className="day-img-banner" src={day.img} alt={day.imgAlt} loading="lazy" />
        <div className="timeline">
          {day.eventos.map(ev => (
            <EventCard key={ev.id} ev={ev} showNotas={showNotas} compact={compact} onOpen={onOpen} />
          ))}
        </div>
      </div>
      <div className="section-divider" />
    </section>
  );
}

/* ── TWEAKS ── */
function TweaksPanel({ tweaks, setTweaks, visible }) {
  if (!visible) return null;
  const set = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
    applyTheme(next.theme);
  };
  return (
    <div className="tweaks-panel">
      <div className="tweaks-title">Tweaks</div>
      <div className="tweak-row">
        <label>Paleta</label>
        <select value={tweaks.theme} onChange={e => set('theme', e.target.value)}>
          <option value="arena">Arena + Mar</option>
          <option value="noche">Noche + Fuego</option>
          <option value="selva">Selva + Sol</option>
        </select>
      </div>
      <div className="tweak-row">
        <label>Mostrar notas</label>
        <input type="checkbox" checked={tweaks.showNotas} onChange={e => set('showNotas', e.target.checked)} />
      </div>
      <div className="tweak-row">
        <label>Cards</label>
        <select value={tweaks.cardStyle} onChange={e => set('cardStyle', e.target.value)}>
          <option value="normal">Normal</option>
          <option value="compact">Compacto</option>
        </select>
      </div>
    </div>
  );
}

function applyTheme(theme) {
  const root = document.documentElement;
  const themes = {
    arena: { '--cream':'oklch(95.5% 0.014 82)', '--cream2':'oklch(92% 0.018 80)', '--navy':'oklch(18% 0.04 245)', '--blue':'oklch(46% 0.09 235)', '--blue-lt':'oklch(56% 0.08 230)', '--gold':'oklch(70% 0.10 75)', '--coral':'oklch(62% 0.11 40)', '--gray':'oklch(60% 0.01 240)', '--vallenato':'oklch(58% 0.16 320)' },
    noche: { '--cream':'oklch(13% 0.02 240)', '--cream2':'oklch(20% 0.025 240)', '--navy':'oklch(92% 0.01 80)', '--blue':'oklch(65% 0.10 210)', '--blue-lt':'oklch(72% 0.09 210)', '--gold':'oklch(72% 0.12 65)', '--coral':'oklch(68% 0.12 35)', '--gray':'oklch(60% 0.02 210)', '--vallenato':'oklch(70% 0.16 320)' },
    selva: { '--cream':'oklch(96% 0.014 130)', '--cream2':'oklch(91% 0.02 130)', '--navy':'oklch(20% 0.05 145)', '--blue':'oklch(50% 0.10 150)', '--blue-lt':'oklch(60% 0.09 150)', '--gold':'oklch(72% 0.11 80)', '--coral':'oklch(64% 0.12 40)', '--gray':'oklch(58% 0.015 160)', '--vallenato':'oklch(58% 0.16 320)' },
  };
  Object.entries(themes[theme] || themes.selva).forEach(([k, v]) => root.style.setProperty(k, v));
  // For noche: white cards need dark bg
  const isDark = theme === 'noche';
  document.querySelectorAll('.event-card').forEach(el => el.style.background = isDark ? 'oklch(18% 0.025 240)' : '');
  document.querySelectorAll('.modal-box').forEach(el => el.style.background = isDark ? 'oklch(16% 0.025 240)' : '');
}

/* ── APP ── */
function App() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem('vq-tweaks')) || {}; } catch { return {}; } })();
  const [tweaks, setTweaks] = React.useState({ ...TWEAK_DEFAULTS, ...saved });
  const [tweaksVisible, setTweaksVisible] = React.useState(false);
  const [activeDay, setActiveDay] = React.useState(1);
  const [modalEv, setModalEv] = React.useState(null);

  React.useEffect(() => {
    applyTheme(tweaks.theme);
    localStorage.setItem('vq-tweaks', JSON.stringify(tweaks));
  }, [tweaks]);

  React.useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    const observers = [];
    DAYS.forEach(d => {
      const el = document.getElementById(d.slug);
      if (!el) return;
      const obs = new IntersectionObserver(entries => { if (entries[0].isIntersecting) setActiveDay(d.id); }, { threshold: 0.25 });
      obs.observe(el);
      observers.push(obs);
    });
    return () => { window.removeEventListener('message', handler); observers.forEach(o => o.disconnect()); };
  }, []);

  const compact = tweaks.cardStyle === 'compact';

  return (
    <>
      <header className="hero">
        <div className="hero-img" role="img" aria-label="Vista caribeña de Barranquilla" />
        <div className="hero-content">
          <p className="hero-eyebrow fade-up">Itinerario personal · Abril 2026</p>
          <h1 className="hero-title fade-up-2">Viaje<span>Quilla</span></h1>
          <div className="hero-meta fade-up-3">
            <span className="hero-dates">25 Abril — 3 Mayo · 9 Días</span>
            <span className="hero-badge">Barranquilla · Valledupar</span>
          </div>
        </div>
      </header>

      <nav className="day-nav">
        {DAYS.map(d => (
          <a key={d.id} href={`#${d.slug}`} className={activeDay === d.id ? 'active' : ''}>
            Día {d.id} — {d.fecha.split(',')[0]}
          </a>
        ))}
      </nav>

      <main>
        {DAYS.map(day => (
          <DaySection key={day.id} day={day} showNotas={tweaks.showNotas}
            compact={compact} onOpen={setModalEv} />
        ))}
      </main>

      <footer>
        <strong>Viaje Quilla</strong> &nbsp;·&nbsp; Barranquilla, Colombia &nbsp;·&nbsp; Abril 2026
      </footer>

      {modalEv && <EventModal ev={modalEv} onClose={() => setModalEv(null)} />}
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
